<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Laser Map Maker → xTool Studio SVG Converter</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <header>
      <h1>Laser Map Maker → xTool Studio</h1>
      <p class="subtitle">
        Drop one or more Laser Map Maker SVGs. Get xTool-Studio-ready files
        with deduplicated paths split into a red cut layer and a black engrave
        layer.
      </p>
    </header>

    <section id="dropzone" class="dropzone">
      <input type="file" id="fileInput" accept=".svg,image/svg+xml" multiple />
      <p>Drop SVG files here, or click to choose. Multiple files supported.</p>
    </section>

    <!-- Results / activity history -->
    <section id="resultsSection" class="results-section" hidden>
      <div class="results-header">
        <button
          id="resultsToggle"
          class="results-toggle"
          aria-expanded="true"
          aria-controls="resultsList"
        >
          <span class="toggle-icon" aria-hidden="true">▼</span>
          <span id="resultsTitle">Activity</span>
          <span id="resultsCount" class="results-count"></span>
        </button>
        <div class="results-actions">
          <button id="downloadAllBtn" class="btn-primary" disabled>
            Download All (ZIP)
          </button>
          <button id="clearBtn" class="btn-ghost">Clear</button>
        </div>
      </div>
      <div id="resultsList" class="results-list"></div>
    </section>

    <!-- Preview panes — shown when Preview is clicked on a result row -->
    <section id="previewSection" class="previews" hidden>
      <div class="pane">
        <h2>Source — <span id="previewLabel">—</span></h2>
        <div id="sourcePreview" class="preview"></div>
      </div>
      <div class="pane">
        <h2>Converted</h2>
        <div id="convertedPreview" class="preview"></div>
      </div>
    </section>

    <footer>
      <span id="buildDate"></span>
    </footer>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
